<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Page Preview — Headley Web & SEO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700&family=Inter:wght@400;600&family=Rock+Salt&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #F3F2EF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    .page {
      width: 860px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ─── Profile card ─── */
    .profile-card {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
    }

    /* Banner — 1584x396 scales to card width */
    .banner-wrap {
      width: 100%;
      aspect-ratio: 4 / 1;
      overflow: hidden;
      position: relative;
      background: #1C2826;
    }
    .banner-wrap iframe {
      width: 1584px;
      height: 396px;
      border: none;
      transform-origin: top left;
      /* scale to fit card width (~860px) */
      transform: scale(calc(860 / 1584));
      display: block;
    }

    /* Logo sits half over the banner */
    .logo-wrap {
      padding: 0 24px;
      margin-top: -36px;
      position: relative;
      z-index: 2;
    }
    /* Business pages use a square logo, not a circle */
    .logo-circle {
      width: 96px;
      height: 96px;
      border-radius: 4px;
      border: 3px solid #fff;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-circle img {
      width: 88px;
      height: 88px;
      object-fit: contain;
    }

    /* Company info */
    .company-info {
      padding: 12px 24px 20px;
    }
    .company-name {
      font-size: 22px;
      font-weight: 600;
      color: rgba(0,0,0,0.9);
      margin-bottom: 2px;
    }
    .company-tagline {
      font-size: 14px;
      color: rgba(0,0,0,0.6);
      margin-bottom: 6px;
    }
    .company-meta {
      font-size: 13px;
      color: rgba(0,0,0,0.5);
      margin-bottom: 14px;
    }
    .company-meta span { margin-right: 8px; }

    .btn-follow {
      display: inline-block;
      padding: 5px 18px;
      border: 1.5px solid #0A66C2;
      border-radius: 16px;
      color: #0A66C2;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ─── Note ─── */
    .note {
      font-size: 12px;
      color: #888;
      text-align: center;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="profile-card">
      <!-- Banner rendered via iframe so fonts/images load correctly -->
      <div class="banner-wrap">
        <iframe src="linkedin-banner.html" scrolling="no"></iframe>
      </div>

      <div class="logo-wrap">
        <div class="logo-circle">
          <img src="public/images/logo-headley-web-updated.webp" onerror="this.src='originals/logo-headley-web-updated.png'" alt="Headley Web & SEO logo">
        </div>
      </div>

      <div class="company-info">
        <div class="company-name">Headley Web &amp; SEO</div>
        <div class="company-tagline">Websites that get you found, called, and booked.</div>
        <div class="company-meta">
          <span>Internet Services</span>·
          <span>Jacksonville, Alabama</span>·
          <span>1 follower</span>
        </div>
        <div class="btn-follow">+ Follow</div>
      </div>
    </div>

    <p class="note">Approximate LinkedIn layout — actual spacing may vary slightly.</p>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fraunces Ampersand Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #1C2826;
      color: #F5F0EB;
      font-family: system-ui, sans-serif;
      gap: 2rem;
    }
    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-optical-sizing: auto;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .label {
      font-size: 0.875rem;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <p class="label">Fraunces — hero style</p>
  <h1>Headley Web & SEO</h1>
  <h1>Where & Wonder Grows Wild</h1>
</body>
</html>

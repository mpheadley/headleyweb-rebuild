<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Business Card Mockup — Headley Web & SEO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700&family=Inter:wght@400;500;600&family=Rock+Salt&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #444;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      gap: 40px;
      padding: 40px;
    }

    .label {
      color: #aaa;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: -28px;
    }

    /* Standard business card: 3.5" x 2" at 300dpi = 1050x600 */
    /* We'll render at 1050x600 for print-res preview */
    .card {
      width: 1050px;
      height: 600px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* ─── FRONT ─── */
    .card-front {
      background: #1C2826;
      display: flex;
    }

    .front-photo {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 380px;
      object-fit: cover;
      object-position: center top;
    }
    .front-photo-fade {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 430px;
      background: linear-gradient(to right, transparent 40%, #1C2826 90%);
      z-index: 1;
    }

    .front-content {
      position: relative;
      z-index: 2;
      margin-left: 360px;
      padding: 50px 50px 50px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
    }

    .front-headline {
      font-family: 'Fraunces', serif;
      font-size: 68px;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .front-headline .accent {
      font-family: 'Rock Salt', cursive;
      color: #E07B3C;
      font-size: 62px;
      font-weight: 400;
    }

    .front-brand {
      position: absolute;
      bottom: 32px;
      left: 380px;
      right: 50px;
      z-index: 2;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .front-brand-name {
      font-family: 'Fraunces', serif;
      font-size: 30px;
      font-weight: 700;
      color: #FFFFFF;
    }
    .front-brand-name .hw-accent {
      color: #E07B3C;
    }
    .front-brand-name .amp {
      font-family: 'Fraunces', serif;
      font-optical-sizing: none;
      font-variation-settings: "opsz" 144;
    }
    .front-url {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
    }

    .front-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(to right, #6B8F71, #E07B3C);
      z-index: 2;
    }

    /* Grain overlay */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 3;
    }

    /* ─── BACK ─── */
    .card-back {
      background: #F5F0EB;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 50px 60px;
    }

    .back-name {
      font-family: 'Fraunces', serif;
      font-size: 38px;
      font-weight: 700;
      color: #1C2826;
      margin-bottom: 4px;
    }

    .back-title {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: #6B8F71;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .back-divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(to right, #6B8F71, #E07B3C);
      margin-bottom: 36px;
    }

    .back-info {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .back-row {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 20px;
      color: #2D2D2D;
    }

    .back-row svg {
      width: 22px;
      height: 22px;
      color: #6B8F71;
      flex-shrink: 0;
    }

    .back-row a {
      color: #2D2D2D;
      text-decoration: none;
    }

    .back-right {
      position: absolute;
      right: 60px;
      top: 50px;
      bottom: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .back-qr {
      width: 160px;
      height: 160px;
    }

    .back-qr-label {
      font-size: 13px;
      color: #6B7280;
      letter-spacing: 0.5px;
      text-align: center;
    }

    .back-brand-name {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 700;
      color: #1C2826;
      text-align: center;
    }
    .back-brand-name .hw-accent {
      color: #E07B3C;
    }
    .back-brand-name .amp {
      font-family: 'Fraunces', serif;
      font-optical-sizing: none;
      font-variation-settings: "opsz" 144;
    }

    .back-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(to right, #6B8F71, #E07B3C);
    }
  </style>
</head>
<body>
  <p class="label">Front</p>

  <div class="card card-front">
    <img class="front-photo" src="headleyweb/public/images/headshot-matt-headley.webp" alt="">
    <div class="front-photo-fade"></div>

    <div class="front-content">
      <h1 class="front-headline">
        Get Found.<br>
        Get Calls.<br>
        Get <span class="accent">Booked.</span>
      </h1>
    </div>

    <div class="front-brand">
      <div class="front-brand-name">Headley <span class="hw-accent">Web <span class="amp">&amp;</span> SEO</span></div>
      <div class="front-url">headleyweb.com</div>
    </div>

    <div class="front-bar"></div>
  </div>

  <p class="label">Back</p>

  <div class="card card-back">
    <div class="back-name">Matt Headley</div>
    <div class="back-title">Web Designer &amp; SEO Specialist</div>
    <div class="back-divider"></div>

    <div class="back-info">
      <div class="back-row">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span>(256) 644-7334</span>
      </div>
      <div class="back-row">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <span>matt@headleyweb.com</span>
      </div>
      <div class="back-row">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span>headleyweb.com</span>
      </div>
      <div class="back-row">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>Jacksonville, Alabama</span>
      </div>
    </div>

    <div class="back-right">
      <img class="back-qr" src="https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=https%3A%2F%2Fheadleyweb.com%3Futm_source%3Dbusiness_card%26utm_medium%3Dqr%26utm_campaign%3Dnetworking&color=1C2826&bgcolor=F5F0EB&format=svg" alt="QR code to headleyweb.com">
      <div class="back-qr-label">Scan to visit</div>
      <div class="back-brand-name">Headley <span class="hw-accent">Web <span class="amp">&amp;</span> SEO</span></div>
    </div>

    <div class="back-bar"></div>
  </div>
</body>
</html>
